<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-top">
        <div class="logo">Dashboard</div>
      </div>

      <ul class="sidebar-nav">
        <li><a href="#">Home</a></li>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Messages</a></li>
        <li><a href="#">History</a></li>
        <li><a href="#">Tasks</a></li>
        <li><a href="#">Communities</a></li>
      </ul>

      <ul class="sidebar-bottom">
        <li><a href="#">Settings</a></li>
        <li><a href="#">Support</a></li>
        <li><a href="#">Privacy</a></li>
      </ul>
    </div>
    <div class="header">
      <div class="header-top-left">
        <span>🔍</span>
        <input type="text" placeholder="Search..." />
      </div>

      <div class="header-top-right">
        <span>🔔</span>
        <span>🐱</span>
        <span class="user-name">Morgan Oakley</span>
      </div>

      <div class="header-bottom-left">
        <span class="big-avatar">🐱</span>
        <div class="greeting">
          <p>Hi there,</p>
          <h2>Morgan Oakley (@morgan)</h2>
        </div>
      </div>

      <div class="header-bottom-right">
        <button>New</button>
        <button>Upload</button>
        <button>Share</button>
      </div>
    </div>
    <div class="main-content">
      <div class="projects-section">
        <h3>Your Projects</h3>
        <div class="projects-grid">
          <div class="card">Project 1</div>
          <div class="card">Project 2</div>
          <div class="card">Project 3</div>
          <div class="card">Project 4</div>
          <div class="card">Project 5</div>
          <div class="card">Project 6</div>
        </div>
      </div>

      <div class="side-panels">
        <div class="announcements">
          <h3>Announcements</h3>
        </div>

        <div class="trending">
          <h3>Trending</h3>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
